<div class="p-6 space-y-6">

  <!-- العنوان + زر الإضافة -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold ">إدارة أنواع العجز</h1>

    <button
      class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm shadow-md transition"
      (click)="startAdd()">
      + إضافة نوع عجز جديد
    </button>
  </div>

  <!-- مربع البحث -->
  <div class="flex justify-end">
    <input
      type="text"
      placeholder="ابحث عن نوع عجز..."
      [(ngModel)]="searchTerm"
      (input)="applySearch()"
      class="w-64 border border-blue-300 rounded-xl px-4 py-2 text-sm text-blue-800 outline-none focus:ring-2 focus:ring-blue-500 transition"
    />
  </div>

  <!-- فورم الإضافة / التعديل -->
  <div *ngIf="showForm"
       class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 space-y-4 animate-[fadeIn_0.3s_ease-out]">

    <h2 class="text-lg font-semibold text-blue-700">
      {{ editMode ? 'تعديل نوع عجز' : 'إضافة نوع عجز جديد' }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="save()"
          class="flex flex-col md:flex-row md:items-start gap-4">

      <!-- اسم نوع العجز -->
      <div class="flex-1">
        <label class="block text-xs text-blue-700 mb-1">اسم نوع العجز</label>

        <input type="text"
               formControlName="name"
               class="w-full border border-blue-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition text-blue-800">

        <div class="h-4 mt-1">
          <span *ngIf="form.controls['name'].invalid && form.controls['name'].touched"
                class="text-red-600 text-xs">

            <span *ngIf="form.controls['name'].errors?.['required']">
              اسم نوع العجز مطلوب.
            </span>

            <span *ngIf="form.controls['name'].errors?.['pattern']">
              الاسم يجب أن يحتوي على حروف فقط بدون أرقام أو رموز.
            </span>

          </span>
        </div>
      </div>

      <!-- أزرار الحفظ والإلغاء -->
      <div class="flex gap-2 self-end md:self-start md:pt-6">

        <button type="submit"
                class="px-5 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow-md transition">
          حفظ
        </button>

        <button type="button"
                class="px-4 py-2 text-sm rounded-lg border border-blue-300 text-blue-700 hover:bg-blue-50 transition"
                (click)="cancel()">
          إلغاء
        </button>

      </div>

    </form>

  </div>

<!-- جدول أنواع العجز -->
<div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">

  <div *ngIf="pagedShortageTypes.length === 0" class="p-10 text-center text-blue-600 text-sm">
    لا توجد نتائج مطابقة.
  </div>

  <table *ngIf="pagedShortageTypes.length > 0" class="w-full text-right text-sm">
    <thead class="bg-blue-100 text-blue-800">
      <tr>
        <th class="px-4 py-3 text-right">الكود</th>
        <th class="px-4 py-3 text-right">اسم نوع العجز</th>
        <th class="px-4 py-3 text-right">إجراءات</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of pagedShortageTypes"
          class="border-b hover:bg-blue-50 transition">

        <td class="px-4 py-3 font-semibold text-blue-700">
          {{ item.id }}
        </td>

        <td class="px-4 py-3 font-medium text-blue-800">
          {{ item.name }}
        </td>

        <td class="px-4 py-3 flex gap-3 justify-end">

          <button
            class="px-3 py-1.5 rounded-lg bg-slate-100 text-blue-700 hover:bg-slate-200 transition shadow-sm"
            (click)="details(item)">
            تفاصيل
          </button>

          <button
            class="px-3 py-1.5 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition shadow-sm"
            (click)="edit(item)">
            تعديل
          </button>

          <button
            class="px-3 py-1.5 rounded-lg bg-rose-600 text-white hover:bg-rose-700 transition shadow-sm"
            (click)="remove(item)">
            حذف
          </button>

        </td>

      </tr>
    </tbody>

  </table>

  <!-- الباجينيشن -->
  <div *ngIf="pagedShortageTypes.length > 0"
       class="flex items-center justify-between px-4 py-3 border-t border-slate-200 bg-slate-50">

    <div class="text-xs text-slate-500">
      صفحة {{ currentPage }} من {{ totalPages }}
    </div>

    <div class="flex items-center gap-2">

      <button
        class="px-3 py-1 text-xs rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 disabled:opacity-40"
        (click)="prevPage()"
        [disabled]="currentPage === 1">
        السابق
      </button>

      <ng-container *ngFor="let p of pages">
        <button
          class="px-3 py-1 text-xs rounded-lg border"
          [ngClass]="currentPage === p
            ? 'bg-blue-600 text-white border-blue-600'
            : 'border-slate-300 text-slate-700 hover:bg-slate-100'"
          (click)="goToPage(p)">
          {{ p }}
        </button>
      </ng-container>

      <button
        class="px-3 py-1 text-xs rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 disabled:opacity-40"
        (click)="nextPage()"
        [disabled]="currentPage === totalPages">
        التالى
      </button>

    </div>

  </div>

</div>


</div>
