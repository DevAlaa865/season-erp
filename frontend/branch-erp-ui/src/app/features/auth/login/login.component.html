<div class="min-h-screen flex items-center justify-center p-6 bg-cover bg-center bg-no-repeat"
     style="background-image: url('assets/backgroundImage/seisonPic.jpg');">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-8 shadow-2xl animate-[fadeIn_0.6s_ease-out]">

    <h1 class="text-center text-2xl font-bold text-white mb-6">
      تسجيل الدخول للمنصة
    </h1>

    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-5">

      <!-- اسم المستخدم -->
      <div>
        <label class="block text-sm text-gray-200 mb-1">اسم المستخدم</label>
        <input type="text"
               formControlName="userName"
               class="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white text-sm outline-none focus:ring-2 focus:ring-blue-400 transition">
      </div>

      <!-- كلمة المرور -->
      <div>
        <label class="block text-sm text-gray-200 mb-1">كلمة المرور</label>
        <input type="password"
               formControlName="password"
               class="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white text-sm outline-none focus:ring-2 focus:ring-blue-400 transition">
      </div>

      <!-- رسالة الخطأ -->
      <div *ngIf="errorMessage" class="text-rose-400 text-xs">
        {{ errorMessage }}
      </div>

      <!-- زر الدخول -->
      <button type="submit"
              [disabled]="isLoading"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
        دخول
      </button>

    </form>

  </div>

</div>
